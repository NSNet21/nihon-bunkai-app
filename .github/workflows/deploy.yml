name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual trigger from GH Actions tab

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22  # 22+ has native WebSocket (required by @supabase/realtime-js during SSR)
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Build Expo web bundle
        run: pnpm exec expo export --platform web

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CF_API_TOKEN }}
          accountId: 70ab6010584e93c3485694244a3a5246
          command: pages deploy dist --project-name=nihon-bunkai-app --branch=main --commit-hash=${{ github.sha }} --commit-message="${{ github.event.head_commit.message }}"
